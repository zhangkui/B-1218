version: '3.8'

services:
  app:
    build: .
    ports:
      - "1218:1218"
    environment:
      - NODE_ENV=production
      - PORT=1218
      - MONGODB_URI=mongodb://mongo:27017/your_farm
      - JWT_SECRET=your_farm_jwt_secret_2024_secure
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped
    networks:
      - farm_network

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - farm_network

volumes:
  mongo_data:


networks:
  farm_network:
    driver: bridge
